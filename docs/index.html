<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DP IV Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdmirror.com/npm/docsify/themes/vue.css">
  <link rel="icon" href="/favicon_dp.png?v=2">
</head>
<style>
  * {
    font-family: 'PingFang SC', 'SF Pro', 'Hiragino Sans GB', '等线', 'Microsoft YaHei', '微软雅黑', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif';
    --theme-color: oklch(57.792% 0.09104 245.011);
    --text-color-tertiary: oklch(63.56% 0.13317 261.947);
  }

  .markdown-section {
    max-width: 1200px;
  }
  
  .markdown-section code {
    font-family: 'SF Mono', 'Roboto Mono', Monaco, 'Inter', 'Microsoft YaHei';
    color: oklch(63.56% 0.13317 261.947);
    box-shadow: 1px 1px 1px rgba(0,0,0,0.1);
    border-radius: 4px;
  }

  :root {
    --quality-color-legendary: #7ec5ff;
    --quality-color-unique: #ff5cf7;
    --quality-color-mythic: #ff3939;
  }

  .context {
    max-width: 1000px;
  }

  .markdown-section code {
    font-family: 'Inter', 'Roboto Mono', 'Monaco', 'courier', 'monospace';
  }

  .redtext {
    color: #f84040; 
    font-weight: 600;
  }

  .quote {
    background: #fbfdff;
    color: #606974;
    border: 1px dashed #ccc;
    border-radius: 5px;
    font-size: 18px;
    padding: 5px;
    margin: 0px;
  }

  .table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .maintitle {
    font-size: 24px;
    font-weight: 800;
    margin: 0.6rem 0;
    color: #333;
    line-height: 1.8;
  }

  .box-context {
    font-size: 16px;
    font-weight: 500;
    color: #888;
    line-height: 1.35;
    text-align: left;
    margin: 12px 24px;
    padding: 12px 0;

    &:hover {
      color: transparent;
    }

    @media (max-width: 768px) {
      margin: 0;
      padding: 12px 4px;
    }

  }

  .tooltip {
    position: relative;
    cursor: pointer;
  }

  .tooltip .tooltip-text {
    visibility: hidden;
    padding: 8px;
    border-radius: 10px;
    position: absolute;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.35s;
    text-shadow: 0.5px 0.5px 1px rgba(0, 0, 0, 0.25);
  }

  .tooltip-top .tooltip-text {
    bottom: 50%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 48px;
  }

  .tooltip-top .tooltip-text::after {
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border-color: white transparent transparent transparent;
  }

  .tooltip:hover .tooltip-text {
    visibility: visible;
    color: #555;
    opacity: 1;
  }

  .redbox {
    background: #fdf4f4;
    color: #85553e;
    box-shadow: 0 0 6px #441313a0;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    padding: 20px;
    margin: 0px;
  }

  .greenbox {
    background: #f4fdf7;
    color: #3e854f;
    border: 1px solid #40924e;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    padding: 20px;
    margin: 0px;
  }

  .bluebox {
    background: #f2faff;
    color: #466fa1;
    border: 1px solid #5b9abe;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    padding: 20px;
    margin: 0px;
  }

  .yellowbox {
    background: #fff9f1;
    color: #c5985c;
    border: 1px solid #cfae8f;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    padding: 20px;
    margin: 0px;
  }

  .quote-hl {
    display: inline-block;
    background-color:rgb(248, 248, 248);
    color:rgb(240, 25, 211);
    border-radius: 3px;
    margin: 3px;
    padding: 0px 3px;
  }

  .markdown-section img:not([width]):not([style]) {
    max-width: 600px;
    height: auto;
    max-height: 400px;
    border-radius: 1em;
    box-shadow: 0 0 0.25em rgba(0,0,0,0.25);
    margin: 0.25em 0;
  }

  .markdown-section figure, .markdown-section p {
    margin: 0;
  }

  .inline-tips {
    position: relative;
    margin: 5px 7px;
    padding: 1px 12px;
    font-size: 14px;
    line-height: 1.5;
    color: #999;
    max-width: 750px;

    &::before {
      content: "";
      position: absolute;
      left: 0;
      top: 11px;
      transform: translateY(-50%);
      width: 5px;
      height: 20px;
      background: rgb(180, 180, 180);
      border-radius: 4px;
    }

    &:hover::before {
      content: "";
      background: rgb(146, 173, 230);
    }
  }

  .little-tips {
    max-width: 360px;
    padding: 1em;
    box-shadow: 0 0 4px #3f9c4380;
    background: #f8fffa;
    border-radius: 1em;
    font-size: 14.25px;
    margin: 8px 0;
    display: flex;
    gap: 1em;
    align-items: center;

    &.red {
      box-shadow: 0 0 4px #ca6a6aa0;
      color: #534444;
      background: #fff7f8;
    }

    &.blue {
      box-shadow: 0 0 4px #5d8cb6a0;
      color: #2c4255;
      background: #f7fcff;
    }

    &.purple {
      box-shadow: 0 0 4px #a45db6a0;
      color: #5e3f66;
      background: #fef7ff;
    }

    &.pink {
      box-shadow: 0 0 4px #ca6ac2a0;
      background: #fff7ff;
    }

    &.yellow {
      box-shadow: 0 0 4px #d5a02ea0;
      color: #5e3f66;
      background: #fef7ff;
    }
  }

  .little-tips-blue {
    box-shadow: 0 0 4px #5d8cb6a0;
    color: #2c4255;
    background: #f7fcff;
  }
  
  .little-tips-purple {
    box-shadow: 0 0 4px #a45db6a0;
    color: #5e3f66;
    background: #fef7ff;
  }
  .little-tips-pink {
    box-shadow: 0 0 4px #ca6ac2a0;
    background: #fff7ff;
  }

  .item-name-tag {
    background: #faf7f5;
    padding: 1px 4px;
    border-radius: 4px;
    margin: 4px;
    font-weight: 600;
    color: #333;
    box-shadow: 0 0 1px rgba(46, 22, 6, 0.1);
  }

  .number-block {
    display: inline-block;
    width: var(--width, 8em);
    background: rgb(250, 252, 254);
    box-shadow: 0 1px 2px rgba(11, 36, 87, 0.15);
    border-radius: 6px;
    padding: 0.5px 6px;
    line-height: 1.33;
    text-align: center;
    font-size: 0.8rem;
    font-family: 'Roboto Mono', Monaco, courier, monospace, 'CONSOLA';
    font-weight: 500;
    color: rgb(135, 115, 228);
  }

  .nowrap {
    display: inline-block;
    text-decoration: inherit;
    white-space: nowrap;
  }

  .highlight-purple {
    font-weight: 600;
    color: rgba(0,0,0,0.75);
    padding: 0 4px;
    border-radius: 20px 20px 10px 10px; 
    background: linear-gradient(
      to bottom, 
      transparent, 
      transparent 30%, 
      rgba(228, 212, 248, 0.6) 50%, 
      rgba(192, 180, 220, 0.5) 100%
    );
  }

  details[open] {
    margin: 0.5em 0;
    transition: margin 0.25s ease-in-out;
    background: rgba(170, 177, 187, 0.07);
    width: max-content;
    border-radius: 0.5em;
    padding: 0.25em 0.5em;
  }

  details {
    transition: margin 0.25s ease-in-out;
  }

  .page_toc div[class^="lv"] a {
    font-weight: 400 !important;
  }
  
  @media (max-width: 768px) {
    .markdown-section img:not([width]):not([style]) {
      width: 100%;
      max-width: 400px;
    }
  }
</style>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadNavbar: false,
      loadSidebar: true,
      subMaxLevel: 3,
      homepage: '#/pages/README.md',
      latex: {
        inlineMath   : [['$', '$'], ['\\(', '\\)']],
        displayMath  : [['$$', '$$']],
      },
      routes: {
      '/:path': '/pages/:path'
      },
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdmirror.com/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdmirror.com/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdmirror.com/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="//cdn.jsdmirror.com/npm/docsify-latex@0"></script>
  <script src="//cdn.jsdmirror.com/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdmirror.com/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
